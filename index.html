<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>For Sulaf</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#07070f;
overflow:hidden;
font-family:Segoe UI;
color:white;
height:100vh;
}

.stars{
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%, rgba(255,255,255,.8) 1px, transparent 2px),
radial-gradient(circle at 70% 40%, rgba(255,255,255,.7) 1px, transparent 2px),
radial-gradient(circle at 50% 80%, rgba(255,255,255,.6) 1px, transparent 2px);
background-size:300px 300px;
animation: drift 25s linear infinite;
}

@keyframes drift{
from{transform:scale(1);}
to{transform:scale(1.25);}
}

.screen{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
transition:1s;
}

.hidden{
opacity:0;
pointer-events:none;
transform:scale(.96);
}

.card{
backdrop-filter:blur(24px);
background:rgba(255,255,255,.05);
padding:45px;
border-radius:30px;
border:1px solid rgba(255,255,255,.1);
width:min(90%,500px);
text-align:center;
box-shadow:0 0 40px rgba(170,130,255,.15);
}

h1{
font-weight:300;
margin-bottom:25px;
}

input{
width:100%;
padding:16px;
border:none;
outline:none;
border-radius:18px;
margin:20px 0;
background:rgba(255,255,255,.08);
color:white;
font-size:16px;
}

button{
padding:14px 35px;
border:none;
border-radius:20px;
background:#8f74ff;
color:white;
cursor:pointer;
font-size:16px;
}

.reveal{
font-size:54px;
margin-top:25px;
opacity:0;
transform:translateY(20px);
transition:1.5s;
text-shadow:0 0 30px rgba(255,255,255,.6);
}

.show{
opacity:1;
transform:none;
}

.final-star{
width:140px;
height:140px;
border-radius:50%;
background:white;
box-shadow:
0 0 30px white,
0 0 80px #b49cff,
0 0 160px #8f74ff;
animation:pulse 3s infinite;
margin-bottom:40px;
}

@keyframes pulse{
50%{
transform:scale(1.12);
}
}

.final-text{
font-size:26px;
line-height:1.8;
max-width:800px;
text-align:center;
padding:20px;
}
</style>
</head>
<body>

<div class="stars"></div>

<div class="screen" id="screen1">
<div class="card">
<h1>What is the meaning of life?</h1>
<input id="answer" placeholder="Type your answer...">
<button onclick="reveal()">Submit</button>
<div class="reveal" id="revealText">Sulaf 🤍</div>
</div>
</div>

<div class="screen hidden" id="screen2">
<div class="card">
<h1>Enter your birthday</h1>
<input type="date" id="date">
<button onclick="finish()">Continue</button>
</div>
</div>

<div class="screen hidden" id="screen3">
<div class="final-star"></div>

<div class="final-text">
Some birthdays are dates.<br>
Yours became destiny.<br><br>

Happy Birthday to the girl<br>
who quietly became<br>
my favorite part of existence. 🤍
</div>
</div>

<script>
function reveal(){
let ans=document.getElementById("answer").value.trim();
if(!ans) return;

let reveal=document.getElementById("revealText");
reveal.classList.add("show");

setTimeout(()=>{
document.getElementById("screen1").classList.add("hidden");
document.getElementById("screen2").classList.remove("hidden");
},3000);
}

function finish(){
let date=document.getElementById("date").value;
if(!date) return;

document.getElementById("screen2").classList.add("hidden");

setTimeout(()=>{
document.getElementById("screen3").classList.remove("hidden");
},1000);
}
</script>

</body>
</html>
